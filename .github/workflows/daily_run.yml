name: Daily Krishna Post Bot

on:
  schedule:
    - cron: '30 2 * * *'  # Roz subah IST ke hisaab se chalega
  workflow_dispatch:      # Manual button ke liye

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Ye permissions files ko wapas repo mein save karne ke liye zaroori hain
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python bot.py

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Sabhi nayi aur purani files (mp4, jpg, txt) ko add karega
          git add -A
          
          # Agar kuch naya bana hai tabhi commit karega
          git commit -m "New Krishna Reel: $(date)" || echo "No changes to commit"
          
          # Main branch par push karega
          git push origin main
