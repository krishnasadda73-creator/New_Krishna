name: Daily Krishna Post Bot

on:
  schedule:
    - cron: '30 2 * * *'  # Ye roz subah 8:00 AM (IST) par chalega
  workflow_dispatch:      # Isse tum manually bhi jab chaho "Run" kar sakte ho

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py
